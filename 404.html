<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Nicht gefunden</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .terminal {
            position: relative;
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        .glitch {
            font-size: 2rem;
            font-weight: bold;
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
            white-space: pre-line;
            line-height: 1.5;
            text-shadow: 0 0 5px #0f0;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Scanlines and flicker effects omitted for brevity, but kept in structure */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        a {
            color: #0f0;
            text-decoration: none;
            border: 1px solid #0f0;
            padding: 10px 20px;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        
        a:hover {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }
    </style>
</head>
<body class="crt">
    <div class="scanlines"></div>
    <div class="terminal">
        <div class="glitch" data-text="FEHLER 404: PFAD NICHT GEFUNDEN.
        DIE WELLE HAT DIESEN ORT NOCH NICHT EINGENOMMEN.">
            FEHLER 404: PFAD NICHT GEFUNDEN.
            DIE WELLE HAT DIESEN ORT NOCH NICHT EINGENOMMEN.
        </div>
        <br>
        <a href="index.html">ZURÜCK ZUR ORDNUNG</a><span class="cursor"></span>
    </div>
</body>
</html>
