<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Nicht gefunden</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .terminal {
            position: relative;
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        .glitch {
            font-size: 2rem;
            font-weight: bold;
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
            white-space: pre-line;
            line-height: 1.5;
            text-shadow: 0 0 5px #0f0;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            white-space: pre-line;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 red;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 blue;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(22px, 9999px, 83px, 0); }
            5% { clip: rect(31px, 9999px, 66px, 0); }
            10% { clip: rect(84px, 9999px, 19px, 0); }
            15% { clip: rect(10px, 9999px, 90px, 0); }
            20% { clip: rect(52px, 9999px, 7px, 0); }
            25% { clip: rect(72px, 9999px, 20px, 0); }
            30% { clip: rect(4px, 9999px, 34px, 0); }
            35% { clip: rect(49px, 9999px, 81px, 0); }
            40% { clip: rect(69px, 9999px, 16px, 0); }
            45% { clip: rect(27px, 9999px, 62px, 0); }
            50% { clip: rect(98px, 9999px, 93px, 0); }
            55% { clip: rect(58px, 9999px, 2px, 0); }
            60% { clip: rect(20px, 9999px, 61px, 0); }
            65% { clip: rect(38px, 9999px, 35px, 0); }
            70% { clip: rect(76px, 9999px, 25px, 0); }
            75% { clip: rect(9px, 9999px, 91px, 0); }
            80% { clip: rect(64px, 9999px, 5px, 0); }
            85% { clip: rect(41px, 9999px, 50px, 0); }
            90% { clip: rect(81px, 9999px, 71px, 0); }
            95% { clip: rect(3px, 9999px, 47px, 0); }
            100% { clip: rect(55px, 9999px, 87px, 0); }
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .crt {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        a {
            color: #0f0;
            text-decoration: none;
            border: 1px solid #0f0;
            padding: 10px 20px;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        
        a:hover {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }
    </style>
</head>
<body class="crt">
    <div class="scanlines"></div>
    <div class="terminal">
        <div class="glitch" data-text="████ ERROR 404 ████&#10;&#10;DIESE INFORMATION&#10;EXISTIERT NICHT.&#10;&#10;ODER SIE DÜRFEN SIE&#10;NICHT SEHEN.">████ ERROR 404 ████

DIESE INFORMATION
EXISTIERT NICHT.

ODER SIE DÜRFEN SIE
NICHT SEHEN.</div>
        <div><span class="cursor"></span></div>
        <br>
        <a href="/">[ VERBINDUNG ZUM MAIN-TERMINAL HERSTELLEN ]</a>
    </div>
</body>
</html>
