<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Die Welle - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --welle-blue: #003366;
            --welle-dark: #0a0a0a;
            --terminal-green: #00ff00;
            --terminal-red: #ff0000;
        }

        body {
            background-color: var(--welle-dark);
            color: #e5e5e5;
            font-family: 'Roboto Mono', monospace;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- VISUAL OVERLAYS --- */
        #grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 100;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        #scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 99;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            opacity: 0.6;
        }

        /* --- SECTIONS --- */
        .section-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 51, 102, 0.5);
            display: none;
        }

        .section-container.active {
            display: block;
        }

        /* LOGIN FORM */
        .login-title {
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .form-control {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            border-radius: 0;
            margin-bottom: 1rem;
        }

        .form-control:focus {
            background: transparent;
            color: #fff;
            border-color: var(--welle-blue);
            box-shadow: 0 0 10px rgba(0, 51, 102, 0.8);
        }

        .btn-welle {
            width: 100%;
            background: var(--welle-blue);
            color: #fff;
            border: none;
            border-radius: 0;
            padding: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-welle:hover {
            background: #fff;
            color: var(--welle-blue);
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        /* TERMINAL */
        #terminal {
            font-family: 'Roboto Mono', monospace;
            color: var(--terminal-green);
            font-size: 1.2rem;
            min-height: 300px;
        }

        .terminal-line {
            margin-bottom: 10px;
            opacity: 0;
        }

        .terminal-line.red {
            color: var(--terminal-red);
            font-weight: bold;
            text-shadow: 0 0 5px var(--terminal-red);
        }

        /* DASHBOARD */
        .dashboard-header {
            text-align: center;
            border-bottom: 2px solid var(--welle-blue);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .ranking-list {
            list-style: none;
            padding: 0;
        }

        .ranking-item {
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-left: 4px solid var(--welle-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ranking-item.top-1 { border-left-color: #ffd700; }
        .ranking-item.top-2 { border-left-color: #c0c0c0; }
        .ranking-item.top-3 { border-left-color: #cd7f32; }

    </style>
</head>
<body>

    <div id="grain-overlay"></div>
    <div id="scanlines"></div>

    <!-- LOGIN SECTION -->
    <div id="login-section" class="section-container active">
        <h2 class="login-title">System Login</h2>
        <form id="login-form">
            <input type="text" id="username" class="form-control" placeholder="MITGLIEDSNAME / ID" required>
            <input type="password" id="password" class="form-control" placeholder="PASSWORT" required>
            <button type="submit" class="btn-welle mt-3">Einloggen</button>
        </form>
        <div class="text-center mt-3">
            <a href="Index.html" class="text-muted" style="text-decoration: none; font-size: 0.8rem;">&lt; ZURÜCK</a>
        </div>
    </div>

    <!-- TERMINAL SECTION -->
    <div id="terminal-section" class="section-container">
        <div id="terminal"></div>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboard-section" class="section-container" style="max-width: 800px; padding: 0; background: transparent; border: none; box-shadow: none;">
        
        <!-- HERO BANNER -->
        <div class="hero-banner" style="background: var(--welle-blue); color: white; padding: 3rem 2rem; text-align: center; margin-bottom: 2rem; border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 51, 102, 0.5);">
            <h1 class="text-uppercase" style="letter-spacing: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.5); font-size: 2.5rem; margin-bottom: 1rem;">SYSTEM ONLINE</h1>
            <p id="welcome-message" class="mb-0" style="font-size: 1.2rem; opacity: 0.9;">Willkommen, [User]</p>
        </div>

        <!-- DASHBOARD CONTENT -->
        <div style="background: rgba(0, 0, 0, 0.8); border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 51, 102, 0.5); padding: 2rem;">
            <div class="row">
                <div class="col-md-12">
                    <h4 class="mb-3 text-uppercase" style="color: var(--welle-blue);">Lokale Rangliste</h4>
                    <ul class="ranking-list">
                        <li class="ranking-item top-1">
                            <span><strong>#1</strong> Mitglied 8821-W</span>
                            <span class="badge bg-primary rounded-pill px-3 py-2">921 Punkte</span>
                        </li>
                        <li class="ranking-item top-2">
                            <span><strong>#2</strong> Mitglied 4422-W</span>
                            <span class="badge bg-secondary rounded-pill px-3 py-2">874 Punkte</span>
                        </li>
                        <li class="ranking-item top-3">
                            <span><strong>#3</strong> Mitglied 7399-W</span>
                            <span class="badge" style="background-color: #cd7f32; padding: 0.5em 1em; border-radius: 50rem;">812 Punkte</span>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="text-center mt-5">
                 <a href="Index.html" class="btn-welle" style="display: inline-block; width: auto; padding: 10px 30px; text-decoration: none;">AUSLOGGEN</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            
            // Set welcome message
            document.getElementById('welcome-message').innerText = `Willkommen, ${username}`;
            
            // Switch to terminal
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('terminal-section').classList.add('active');
            
            startTerminalAnimation();
        });

        const terminalLines = [
            { text: "> LOGIN SUCCESSFUL", class: "" },
            { text: "> OPENING WAVE DATABASE...", class: "" },
            { text: "> LOADING FILES...", class: "" },
            { text: "> WARNING:", class: "red" },
            { text: "> DEMOCRATIC THOUGHT DETECTED", class: "red" },
            { text: "> PURGING...", class: "red" }
        ];

        async function startTerminalAnimation() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = '';
            
            for (let i = 0; i < terminalLines.length; i++) {
                await typeLine(terminal, terminalLines[i].text, terminalLines[i].class);
                await new Promise(r => setTimeout(r, 600)); // Pause between lines
            }
            
            // Wait a bit after purging, then show dashboard
            setTimeout(() => {
                document.getElementById('terminal-section').classList.remove('active');
                document.getElementById('dashboard-section').classList.add('active');
            }, 1500);
        }

        function typeLine(container, text, className) {
            return new Promise(resolve => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'terminal-line ' + className;
                lineDiv.style.opacity = 1;
                container.appendChild(lineDiv);
                
                let i = 0;
                const typingInterval = setInterval(() => {
                    lineDiv.textContent += text.charAt(i);
                    i++;
                    if (i >= text.length) {
                        clearInterval(typingInterval);
                        resolve();
                    }
                }, 50); // Typing speed
            });
        }
    </script>
</body>
</html>
